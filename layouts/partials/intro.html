<section class="{{ .Site.Params.ascentColor | default "bg-pink-50" }} dark:bg-gray-900">
  <div class="container max-w-screen ml-0 px-6 py-6 flex gap-4 lg:gap-8 items-center">
    <img class="rounded-full shadow-sm aspect-square h-32" src="{{ .Site.Params.introPhoto }}" alt="{{ .Site.Title }}" />
    <div>
      <h1 class="text-4xl font-bold mb-2">{{ .Site.Params.introTitle | safeHTML}}</h1>
      <p class="font-light text-lg">{{ .Site.Params.introSubtitle | safeHTML}}</p>
    </div>
  </div>
</section>
